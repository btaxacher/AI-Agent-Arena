databases:
  - name: ai-agent-arena-db
    plan: free
    databaseName: ai_agent_arena
    user: arena
    region: frankfurt

services:
  - type: web
    name: ai-agent-arena-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-agent-arena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-agent-arena-redis
          type: redis
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

  - type: redis
    name: ai-agent-arena-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
